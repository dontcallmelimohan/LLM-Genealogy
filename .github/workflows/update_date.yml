name: Weekly Model Data Update

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  run-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly incremental update
        run: python server.py --once --trigger github_actions

      - name: Commit updated data
        run: |
          git config --global user.name "Auto Update"
          git config --global user.email "auto@github.com"
          git add data hf_models_has_base.csv
          git diff --staged --quiet && exit 0
          git commit -m "Auto update model data $(date +'%Y-%m-%d')"
          git push origin HEAD:main
